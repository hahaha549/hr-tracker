<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HR Signal — Problem Validation Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2128;
    --border: #2a2d35;
    --border2: #363a45;
    --accent: #e8ff47;
    --accent2: #b8cc2a;
    --text: #e8eaf0;
    --text2: #8a8f9e;
    --text3: #5a5f6e;
    --danger: #ff5c5c;
    --info: #4da6ff;
    --success: #47e8a0;
    --tag-bg: #1e2a1a;
    --tag-border: #2e4a26;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 6px;
    --transition: 0.15s ease;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .logo span { color: var(--text3); font-weight: 400; }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .tab-bar {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 3px;
  }
  .tab-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    border-radius: 4px;
    transition: var(--transition);
  }
  .tab-btn.active { background: var(--accent); color: #0e0f11; }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #0e0f11; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid #3a1a1a; }
  .btn-danger:hover { background: #1a0a0a; }

  main { flex: 1; padding: 24px 28px; max-width: 1400px; margin: 0 auto; width: 100%; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 12px 8px 34px;
    border-radius: var(--radius);
    outline: none;
    transition: var(--transition);
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
    font-size: 14px;
  }

  select.filter-sel {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    border-radius: var(--radius);
    outline: none;
    cursor: pointer;
    transition: var(--transition);
  }
  select.filter-sel:focus { border-color: var(--accent); color: var(--text); }

  .filter-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    padding: 8px 0;
    white-space: nowrap;
  }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface); }
  th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    font-size: 13px;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: var(--transition); }
  tbody tr:hover { background: var(--surface); }

  .cell-name { font-weight: 500; color: var(--text); white-space: nowrap; }
  .cell-role { color: var(--text2); font-size: 12px; }
  .cell-company { color: var(--text3); font-size: 12px; }
  .cell-country { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .cell-pain {
    font-family: var(--mono);
    font-size: 11px;
    background: #1a2010;
    border: 1px solid #2e4020;
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    display: inline-block;
  }
  .cell-response {
    max-width: 260px;
    color: var(--text2);
    font-size: 12px;
    line-height: 1.4;
    cursor: pointer;
  }
  .cell-response .truncate { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .cell-response:hover .truncate { -webkit-line-clamp: 99; }

  .tag-pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    margin: 1px 2px 1px 0;
    border: 1px solid;
  }
  .tag-manual { background: #1a1020; border-color: #3a2040; color: #c084fc; }
  .tag-workaround { background: #1a1a00; border-color: #3a3a00; color: #fbbf24; }
  .tag-time-consuming { background: #001a1a; border-color: #003a3a; color: #34d399; }
  .tag-errors { background: #1a0a00; border-color: #3a1a00; color: #fb923c; }

  .status-pill {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .status-Pending { background: #1a1a0a; border: 1px solid #3a3a10; color: #d4c84a; }
  .status-Responded { background: #0a1a0a; border: 1px solid #1a3a1a; color: var(--success); }
  .status-No\ Reply { background: #1a0a0a; border: 1px solid #3a1010; color: #f87171; }

  .row-actions { display: flex; gap: 6px; white-space: nowrap; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px;
    border-radius: 3px;
    font-size: 13px;
    transition: var(--transition);
    line-height: 1;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }
  .icon-btn.del:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .big { font-size: 32px; margin-bottom: 10px; }
  .empty-state p { font-family: var(--mono); font-size: 12px; }

  /* ── PATTERN VIEW ── */
  .pattern-grid { display: grid; gap: 12px; }
  .pattern-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: start;
    transition: var(--transition);
  }
  .pattern-card:hover { border-color: var(--border2); }
  .pattern-pain {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .pattern-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .pattern-count {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    text-align: right;
    line-height: 1;
  }
  .pattern-count small {
    display: block;
    font-size: 10px;
    color: var(--text3);
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .pattern-roles {
    font-size: 12px;
    color: var(--text2);
    margin-top: 6px;
  }
  .pattern-roles strong { color: var(--text3); font-weight: 500; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

  .no-patterns {
    text-align: center;
    padding: 60px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    width: 100%;
    max-width: 660px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(16px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .modal-title {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }
  .modal-body { padding: 20px 22px; }
  .modal-footer {
    padding: 14px 22px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
  }
  label .req { color: var(--accent); }

  input[type="text"], textarea, select.form-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 9px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: var(--transition);
    width: 100%;
  }
  input[type="text"]:focus, textarea:focus, select.form-select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 90px; font-size: 13px; line-height: 1.5; }
  select.form-select { cursor: pointer; }

  .pain-builder {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .pain-sep { font-family: var(--mono); color: var(--text3); text-align: center; font-size: 16px; }
  .pain-preview {
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: #1a2010;
    border: 1px solid #2e4020;
    padding: 5px 10px;
    border-radius: 4px;
    min-height: 28px;
  }

  /* multi-select tags */
  .tag-select { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
  .tag-toggle {
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text2);
    transition: var(--transition);
    user-select: none;
  }
  .tag-toggle.selected.tag-manual { background: #1a1020; border-color: #6d28d9; color: #c084fc; }
  .tag-toggle.selected.tag-workaround { background: #1a1a00; border-color: #92400e; color: #fbbf24; }
  .tag-toggle.selected.tag-time-consuming { background: #001a1a; border-color: #065f46; color: #34d399; }
  .tag-toggle.selected.tag-errors { background: #1a0a00; border-color: #92400e; color: #fb923c; }
  .tag-toggle:not(.selected):hover { border-color: var(--border2); color: var(--text); }

  /* char counter */
  .field-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: var(--radius);
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok { border-left: 3px solid var(--accent); }
  #toast.err { border-left: 3px solid var(--danger); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .stat-lbl {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .stat-sep { width: 1px; background: var(--border); align-self: stretch; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">HR Signal <span>/ Problem Validation</span></div>
  <div class="header-actions">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchView('entries')">Entries</button>
      <button class="tab-btn" onclick="switchView('patterns')">Patterns</button>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ New Entry</button>
  </div>
</header>

<main>

  <!-- ENTRIES VIEW -->
  <div id="view-entries" class="view active">
    <div class="stats-bar" id="stats-bar"></div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Search name, role, response, pain…" oninput="renderTable()" />
      </div>
      <select class="filter-sel" id="f-workflow" onchange="renderTable()"><option value="">All Workflows</option></select>
      <select class="filter-sel" id="f-problem" onchange="renderTable()"><option value="">All Problems</option></select>
      <select class="filter-sel" id="f-status" onchange="renderTable()">
        <option value="">All Status</option>
        <option>Pending</option>
        <option>Responded</option>
        <option>No Reply</option>
      </select>
      <select class="filter-sel" id="f-tag" onchange="renderTable()">
        <option value="">All Tags</option>
        <option value="manual">manual</option>
        <option value="workaround">workaround</option>
        <option value="time-consuming">time-consuming</option>
        <option value="errors">errors</option>
      </select>
      <span class="filter-count" id="filter-count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Role / Company</th>
            <th>Country</th>
            <th>Normalized Pain</th>
            <th>Tags</th>
            <th>Status</th>
            <th>Response</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- PATTERNS VIEW -->
  <div id="view-patterns" class="view">
    <div class="stats-bar" id="pattern-stats-bar"></div>
    <div class="pattern-grid" id="pattern-grid"></div>
  </div>

</main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Entry</div>
      <button class="icon-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">

        <div class="form-group">
          <label>Name <span class="req">*</span></label>
          <input type="text" id="f-name" placeholder="e.g. Sarah Chen" maxlength="80" />
        </div>

        <div class="form-group">
          <label>Role / Title <span class="req">*</span></label>
          <input type="text" id="f-role" placeholder="e.g. HR Manager" maxlength="80" />
        </div>

        <div class="form-group">
          <label>Company <span style="color:var(--text3)">(optional)</span></label>
          <input type="text" id="f-company" placeholder="e.g. Acme Corp" maxlength="80" />
        </div>

        <div class="form-group">
          <label>Country <span class="req">*</span></label>
          <input type="text" id="f-country" placeholder="e.g. France" maxlength="60" />
        </div>

        <div class="form-group full">
          <label>Status</label>
          <select class="form-select" id="f-status-field" onchange="togglePainSection()">
            <option>Pending</option>
            <option>Responded</option>
            <option>No Reply</option>
          </select>
        </div>

        <div class="form-group full">
          <label>Message Sent</label>
          <textarea id="f-message" placeholder="Exact copy of your outreach message…" maxlength="2000"></textarea>
          <div class="field-hint">Store verbatim — no editing or summarizing</div>
        </div>

        <div class="form-group full">
          <label>Response <span style="color:var(--text3)">(verbatim)</span></label>
          <textarea id="f-response" placeholder="Paste exact response — do not paraphrase or summarize…" maxlength="4000" style="min-height:120px"></textarea>
          <div class="field-hint">Raw text only — no interpretation</div>
        </div>

        <div id="pain-section" class="form-group full" style="grid-column:1/-1">
        <div class="form-group full">
          <label>Normalized Pain <span class="req">*</span> <span style="color:var(--text3);font-size:9px">[WORKFLOW] – [PROBLEM TYPE]</span></label>
          <div class="pain-builder">
            <select class="form-select" id="f-workflow-sel" onchange="updatePainPreview()">
              <option value="">Workflow…</option>
              <option>Payroll</option>
              <option>Recruitment</option>
              <option>Training</option>
              <option>Onboarding</option>
              <option>Performance</option>
              <option>Compliance</option>
              <option>Reporting</option>
              <option>Offboarding</option>
              <option>Benefits</option>
              <option>Other</option>
            </select>
            <div class="pain-sep">–</div>
            <select class="form-select" id="f-problem-sel" onchange="updatePainPreview()">
              <option value="">Problem Type…</option>
              <option>Manual corrections</option>
              <option>Coordination</option>
              <option>Candidate tracking</option>
              <option>Data entry</option>
              <option>Approvals</option>
              <option>Reporting delays</option>
              <option>Tool fragmentation</option>
              <option>Communication gaps</option>
              <option>Compliance tracking</option>
              <option>Other</option>
            </select>
          </div>
          <input type="text" id="f-pain-custom" placeholder="Or type custom pain (overrides dropdowns)…" maxlength="100" style="margin-top:8px" oninput="updatePainPreview()" />
          <div class="pain-preview" id="pain-preview">—</div>
        </div>

        <div class="form-group full">
          <label>Problem Tags</label>
          <div class="tag-select" id="tag-select">
            <div class="tag-toggle tag-manual" data-tag="manual" onclick="toggleTag(this)">manual</div>
            <div class="tag-toggle tag-workaround" data-tag="workaround" onclick="toggleTag(this)">workaround</div>
            <div class="tag-toggle tag-time-consuming" data-tag="time-consuming" onclick="toggleTag(this)">time-consuming</div>
            <div class="tag-toggle tag-errors" data-tag="errors" onclick="toggleTag(this)">errors</div>
          </div>
        </div>
        </div> <!-- /pain-section -->

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntry()" id="save-btn">Save Entry</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── DATA ──
const STORAGE_KEY = 'hr_validator_v1';
let entries = [];
let editingId = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : getSampleData();
  } catch { entries = getSampleData(); }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// ── SAMPLE DATA ──
function getSampleData() {
  return [
    {
      id: uid(), name: 'Sarah Chen', role: 'HRIS Manager', company: 'Finova Group',
      country: 'France', status: 'Responded',
      message: 'Hi Sarah, I\'m researching HR workflow pain points for early-stage product development. Would you be open to a 10-minute chat?',
      response: 'Honestly the biggest headache is payroll corrections — every month we have to manually fix 20-30 entries because the data doesn\'t sync properly between our time-tracking tool and the payroll system. It takes the whole team half a day.',
      pain: 'Payroll – Manual corrections', tags: ['manual', 'time-consuming', 'errors']
    },
    {
      id: uid(), name: 'Marc Dupont', role: 'HR Director', company: 'Logistika SA',
      country: 'Belgium', status: 'Responded',
      message: 'Hi Marc, researching recurring HR pain points. Any workflow that still gives you trouble despite having tools in place?',
      response: 'Training coordination is a nightmare. We use three different systems and nothing talks to each other. Scheduling, tracking completion, sending reminders — it\'s all manual.',
      pain: 'Training – Coordination', tags: ['manual', 'workaround', 'time-consuming']
    },
    {
      id: uid(), name: 'Aisha Ndiaye', role: 'Talent Acquisition Lead', company: '',
      country: 'Senegal', status: 'Responded',
      message: 'Hi Aisha, I\'m validating a problem in HR workflows. What\'s one thing you do manually that you wish was automated?',
      response: 'Candidate tracking — we still use a shared spreadsheet because our ATS is too rigid. It\'s always out of date and we miss follow-ups.',
      pain: 'Recruitment – Candidate tracking', tags: ['manual', 'errors', 'workaround']
    },
    {
      id: uid(), name: 'Tom Müller', role: 'HR Generalist', company: 'TechBau GmbH',
      country: 'Germany', status: 'No Reply',
      message: 'Hi Tom, quick question on HR workflows — any recurring pain points worth discussing?',
      response: '', pain: 'Payroll – Manual corrections', tags: ['manual']
    },
    {
      id: uid(), name: 'Laila Benali', role: 'People Ops Manager', company: 'Atlas Digital',
      country: 'Morocco', status: 'Responded',
      message: 'Hi Laila, exploring HR pain points. What\'s a process you still fix manually every month?',
      response: 'Every payroll cycle we spend hours fixing errors from manual data entry. People submit timesheets in different formats and someone has to standardize them before processing.',
      pain: 'Payroll – Manual corrections', tags: ['manual', 'time-consuming', 'errors']
    },
    {
      id: uid(), name: 'James Okafor', role: 'HR Business Partner', company: 'PrimeRetail',
      country: 'Nigeria', status: 'Pending',
      message: 'Hi James, I\'m mapping HR workflow friction. Do you have 5 minutes to share one recurring pain point?',
      response: '', pain: 'Recruitment – Candidate tracking', tags: ['manual']
    },
    {
      id: uid(), name: 'Clara Voss', role: 'HRIS Analyst', company: 'NordBank',
      country: 'Netherlands', status: 'Responded',
      message: 'Hi Clara, I\'m looking for patterns in HR pain. What\'s a workflow that still has too much manual work?',
      response: 'Reporting is our biggest frustration. Every time management wants a report we have to pull data from 4 systems and build it in Excel. It\'s not automated at all.',
      pain: 'Reporting – Reporting delays', tags: ['time-consuming', 'workaround']
    }
  ];
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// ── VIEW SWITCH ──
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  const idx = v === 'entries' ? 0 : 1;
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (v === 'patterns') renderPatterns();
  if (v === 'entries') renderTable();
}

// ── FILTERS ──
function getFilteredEntries() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  const fw = document.getElementById('f-workflow')?.value || '';
  const fp = document.getElementById('f-problem')?.value || '';
  const fs = document.getElementById('f-status')?.value || '';
  const ft = document.getElementById('f-tag')?.value || '';

  return entries.filter(e => {
    if (q && !JSON.stringify(e).toLowerCase().includes(q)) return false;
    if (fw && !e.pain.startsWith(fw + ' –')) return false;
    if (fp && !e.pain.includes('– ' + fp)) return false;
    if (fs && e.status !== fs) return false;
    if (ft && !e.tags.includes(ft)) return false;
    return true;
  });
}

function populateFilters() {
  const workflows = [...new Set(entries.map(e => e.pain.split(' – ')[0]).filter(Boolean))].sort();
  const problems = [...new Set(entries.map(e => e.pain.split(' – ')[1]).filter(Boolean))].sort();
  const fw = document.getElementById('f-workflow');
  const fp = document.getElementById('f-problem');
  fw.innerHTML = '<option value="">All Workflows</option>' + workflows.map(w => `<option>${w}</option>`).join('');
  fp.innerHTML = '<option value="">All Problems</option>' + problems.map(p => `<option>${p}</option>`).join('');
}

// ── RENDER TABLE ──
function renderTable() {
  const filtered = getFilteredEntries();
  const tbody = document.getElementById('table-body');
  document.getElementById('filter-count').textContent = `${filtered.length} / ${entries.length} entries`;

  renderStats();

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="big">◌</div><p>No entries match your filters.<br>Add your first entry or adjust filters.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map((e, i) => `
    <tr>
      <td style="color:var(--text3);font-family:var(--mono);font-size:11px">${i + 1}</td>
      <td>
        <div class="cell-name">${esc(e.name)}</div>
      </td>
      <td>
        <div class="cell-role">${esc(e.role)}</div>
        <div class="cell-company">${esc(e.company || '—')}</div>
      </td>
      <td><div class="cell-country">${esc(e.country)}</div></td>
      <td>${e.pain ? `<span class="cell-pain">${esc(e.pain)}</span>` : '<span style="color:var(--text3)">—</span>'}</td>
      <td>${e.tags.map(t => `<span class="tag-pill tag-${t}">${t}</span>`).join('') || '<span style="color:var(--text3)">—</span>'}</td>
      <td><span class="status-pill status-${e.status}">${e.status}</span></td>
      <td class="cell-response"><div class="truncate">${e.response ? esc(e.response) : '<span style="color:var(--text3)">No response</span>'}</div></td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" title="Edit" onclick="openModal('${e.id}')">✎</button>
          <button class="icon-btn del" title="Delete" onclick="deleteEntry('${e.id}')">⌫</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function renderStats() {
  const total = entries.length;
  const responded = entries.filter(e => e.status === 'Responded').length;
  const uniquePains = new Set(entries.map(e => e.pain).filter(Boolean)).size;
  const topPain = getTopPain();
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Total Entries</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val">${responded}</div><div class="stat-lbl">Responded</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val">${total - responded}</div><div class="stat-lbl">Pending / No Reply</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val">${uniquePains}</div><div class="stat-lbl">Unique Pains</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val" style="font-size:13px;color:var(--accent)">${topPain || '—'}</div><div class="stat-lbl">Leading Signal</div></div>
  `;
}

function getTopPain() {
  if (!entries.length) return null;
  const counts = {};
  entries.filter(e => e.pain).forEach(e => counts[e.pain] = (counts[e.pain] || 0) + 1);
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  return sorted.length ? sorted[0][0] : null;
}

// ── RENDER PATTERNS ──
function renderPatterns() {
  const counts = {};
  entries.filter(e => e.pain).forEach(e => {
    if (!counts[e.pain]) counts[e.pain] = { count: 0, roles: new Set(), tags: new Set() };
    counts[e.pain].count++;
    if (e.role) counts[e.pain].roles.add(e.role);
    e.tags.forEach(t => counts[e.pain].tags.add(t));
  });

  const sorted = Object.entries(counts).sort((a, b) => b[1].count - a[1].count);

  const uniquePains = sorted.length;
  const topCount = sorted[0]?.[1].count || 0;
  const totalWithPain = entries.filter(e => e.pain).length;

  document.getElementById('pattern-stats-bar').innerHTML = `
    <div class="stat"><div class="stat-val">${uniquePains}</div><div class="stat-lbl">Distinct Pains</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val">${totalWithPain}</div><div class="stat-lbl">Entries with Pain</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val">${topCount}</div><div class="stat-lbl">Top Signal Count</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val" style="font-size:13px;color:var(--accent)">${sorted[0]?.[0] || '—'}</div><div class="stat-lbl">Strongest Signal</div></div>
  `;

  if (!sorted.length) {
    document.getElementById('pattern-grid').innerHTML = `<div class="no-patterns">No pain data yet. Add entries to detect patterns.</div>`;
    return;
  }

  document.getElementById('pattern-grid').innerHTML = sorted.map(([pain, d]) => {
    const tags = [...d.tags];
    const roles = [...d.roles];
    const barWidth = Math.round((d.count / topCount) * 100);
    return `
      <div class="pattern-card">
        <div>
          <div class="pattern-pain">${esc(pain)}</div>
          <div style="background:var(--bg);border-radius:3px;height:4px;margin:8px 0;overflow:hidden">
            <div style="width:${barWidth}%;height:100%;background:var(--accent);border-radius:3px;opacity:0.7"></div>
          </div>
          <div class="pattern-meta">
            ${tags.map(t => `<span class="tag-pill tag-${t}">${t}</span>`).join('')}
          </div>
          ${roles.length ? `<div class="pattern-roles"><strong>Roles</strong><br>${roles.map(r => esc(r)).join(' · ')}</div>` : ''}
        </div>
        <div class="pattern-count">${d.count}<small>occurrences</small></div>
      </div>
    `;
  }).join('');
}

// ── MODAL ──
function openModal(id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Edit Entry' : 'New Entry';
  document.getElementById('save-btn').textContent = id ? 'Update Entry' : 'Save Entry';

  // reset
  ['f-name','f-role','f-company','f-country','f-message','f-response','f-pain-custom'].forEach(i => {
    document.getElementById(i).value = '';
  });
  document.getElementById('f-status-field').value = 'Pending';
  document.getElementById('f-workflow-sel').value = '';
  document.getElementById('f-problem-sel').value = '';
  document.querySelectorAll('.tag-toggle').forEach(t => t.classList.remove('selected'));
  updatePainPreview();
  togglePainSection();

  if (id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    document.getElementById('f-name').value = e.name;
    document.getElementById('f-role').value = e.role;
    document.getElementById('f-company').value = e.company || '';
    document.getElementById('f-country').value = e.country;
    document.getElementById('f-message').value = e.message || '';
    document.getElementById('f-response').value = e.response || '';
    document.getElementById('f-status-field').value = e.status;
    togglePainSection();

    // parse pain into dropdowns if possible
    const [w, p] = (e.pain || '').split(' – ');
    const wSel = document.getElementById('f-workflow-sel');
    const pSel = document.getElementById('f-problem-sel');
    const wMatch = [...wSel.options].find(o => o.value === w);
    const pMatch = [...pSel.options].find(o => o.value === p);
    if (wMatch && pMatch) {
      wSel.value = w;
      pSel.value = p;
    } else {
      document.getElementById('f-pain-custom').value = e.pain;
    }
    updatePainPreview();

    e.tags.forEach(t => {
      const el = document.querySelector(`.tag-toggle[data-tag="${t}"]`);
      if (el) el.classList.add('selected');
    });
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ── FORM HELPERS ──
function toggleTag(el) { el.classList.toggle('selected'); }

function togglePainSection() {
  const status = document.getElementById('f-status-field').value;
  const section = document.getElementById('pain-section');
  const label = section.querySelector('label');
  if (status === 'Responded') {
    section.style.display = '';
    label.innerHTML = 'Normalized Pain <span class="req">*</span> <span style="color:var(--text3);font-size:9px">[WORKFLOW] – [PROBLEM TYPE]</span>';
  } else {
    section.style.display = 'none';
  }
}

function updatePainPreview() {
  const custom = document.getElementById('f-pain-custom').value.trim();
  const w = document.getElementById('f-workflow-sel').value;
  const p = document.getElementById('f-problem-sel').value;
  let val = custom || (w && p ? `${w} – ${p}` : (w ? `${w} – ?` : (p ? `? – ${p}` : '')));
  document.getElementById('pain-preview').textContent = val || '—';
}

// ── SAVE ──
function saveEntry() {
  const name = document.getElementById('f-name').value.trim();
  const role = document.getElementById('f-role').value.trim();
  const country = document.getElementById('f-country').value.trim();

  const custom = document.getElementById('f-pain-custom').value.trim();
  const w = document.getElementById('f-workflow-sel').value;
  const p = document.getElementById('f-problem-sel').value;
  const pain = custom || (w && p ? `${w} – ${p}` : '');

  if (!name) { toast('Name is required', 'err'); return; }
  if (!role) { toast('Role is required', 'err'); return; }
  if (!country) { toast('Country is required', 'err'); return; }
  const status = document.getElementById('f-status-field').value;
  if (status === 'Responded' && !pain) { toast('Normalized Pain is required for responded entries', 'err'); return; }

  const tags = [...document.querySelectorAll('.tag-toggle.selected')].map(t => t.dataset.tag);

  const entry = {
    id: editingId || uid(),
    name,
    role,
    company: document.getElementById('f-company').value.trim(),
    country,
    status: document.getElementById('f-status-field').value,
    message: document.getElementById('f-message').value.trim(),
    response: document.getElementById('f-response').value.trim(),
    pain,
    tags
  };

  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    entries[idx] = entry;
  } else {
    entries.unshift(entry);
  }

  save();
  populateFilters();
  renderTable();
  closeModal();
  toast(editingId ? 'Entry updated' : 'Entry saved', 'ok');
}

function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  populateFilters();
  renderTable();
  toast('Entry deleted', 'ok');
}

// ── TOAST ──
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || 'ok');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── UTILS ──
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); openModal(); }
});

// ── INIT ──
load();
populateFilters();
renderTable();
</script>
</body>
</html>
